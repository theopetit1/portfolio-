<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail de Données</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030014;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #7000ff;
            --secondary: #00c6ff;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
            /* Custom cursor */
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            overflow: hidden;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Ambient Background */
        .ambient-light {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--secondary);
            bottom: -150px;
            right: -150px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: #ff0055;
            top: 40%;
            left: 40%;
            filter: blur(100px);
            opacity: 0.3;
            animation-duration: 25s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, background 0.3s;
            z-index: 9999;
            mix-blend-mode: difference;
        }

        .cursor.hovered {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-color: transparent;
            backdrop-filter: blur(2px);
        }

        /* Header */
        header {
            position: absolute;
            top: 3rem;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            opacity: 0.7;
            font-weight: 300;
        }

        /* Main Content */
        .container {
            display: flex;
            gap: 4vw;
            perspective: 2000px;
            padding: 2rem;
            align-items: center;
        }

        .card {
            position: relative;
            width: 28vw;
            height: 60vh;
            min-width: 300px;
            min-height: 450px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 3rem;
            text-decoration: none;
            color: white;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            transform-style: preserve-3d;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 40%, rgba(0, 0, 0, 0.8));
            z-index: 1;
            opacity: 0.6;
            transition: opacity 0.5s;
        }

        .card-bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.4;
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1), opacity 0.5s;
            filter: grayscale(100%);
        }

        .card:hover {
            transform: translateY(-10px) rotateX(5deg);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 30px rgba(112, 0, 255, 0.2);
        }

        .card:hover .card-bg-img {
            transform: scale(1.1);
            opacity: 0.6;
            filter: grayscale(0%);
        }

        .card-content {
            position: relative;
            z-index: 2;
            transform: translateZ(20px);
        }

        .card-number {
            font-size: 5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.1);
            position: absolute;
            top: -80px;
            left: -10px;
            transition: transform 0.5s, color 0.5s;
        }

        .card:hover .card-number {
            transform: translateY(-20px);
            color: rgba(255, 255, 255, 0.2);
        }

        .card-title {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #aaa);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-desc {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
            max-width: 80%;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s 0.1s;
        }

        .card:hover .card-desc {
            opacity: 1;
            transform: translateY(0);
        }

        .card-arrow {
            position: absolute;
            bottom: 3rem;
            right: 3rem;
            width: 50px;
            height: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            z-index: 2;
            transition: all 0.4s;
            transform: translateZ(30px);
        }

        .card:hover .card-arrow {
            background: white;
            color: black;
            border-color: white;
            transform: translateZ(30px) rotate(-45deg);
        }

        footer {
            position: absolute;
            bottom: 2rem;
            text-align: center;
            width: 100%;
            z-index: 10;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.05em;
        }

        .names {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                padding-top: 8rem;
            }

            .card {
                width: 90vw;
                height: 40vh;
            }

            header {
                top: 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="cursor"></div>

    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <header>
        <h1>S3 - Saé Collecte de données web</h1>
    </header>

    <div class="container">
        <a href="api.html" class="card" data-tilt>
            <img src="https://images.unsplash.com/photo-1504608524841-42fe6f032b4b?q=80&w=1000&auto=format&fit=crop"
                class="card-bg-img" alt="Weather">
            <div class="card-content">
                <div class="card-number">01</div>
                <h2 class="card-title">Météo<br>API</h2>
                <p class="card-desc">Données climatiques en temps réel et prévisions mondiales.</p>
            </div>
            <div class="card-arrow">→</div>
        </a>

        <a href="viz_scrapping.html" class="card" data-tilt>
            <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?q=80&w=1000&auto=format&fit=crop"
                class="card-bg-img" alt="Population">
            <div class="card-content">
                <div class="card-number">02</div>
                <h2 class="card-title">France<br>Data</h2>
                <p class="card-desc">Analyse démographique interactive basée sur le scraping.</p>
            </div>
            <div class="card-arrow">→</div>
        </a>
    </div>

    <footer>
        <p>Réalisé par <span class="names">Théo PETIT, Mathieu LOPES-MOREIRA, Octave ROMER</span></p>
    </footer>

    <script>
        // Custom Cursor Logic
        const cursor = document.querySelector('.cursor');
        const links = document.querySelectorAll('a');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        links.forEach(link => {
            link.addEventListener('mouseenter', () => {
                cursor.classList.add('hovered');
            });
            link.addEventListener('mouseleave', () => {
                cursor.classList.remove('hovered');
            });
        });

        // Vanilla Tilt Effect
        const cards = document.querySelectorAll('.card');

        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const centerX = rect.width / 2;
                const centerY = rect.height / 2;

                // Calculate rotation based on mouse position
                const rotateX = ((y - centerY) / centerY) * -8; // Max -8deg to 8deg
                const rotateY = ((x - centerX) / centerX) * 8;

                // Apply transform
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
            });

            card.addEventListener('mouseleave', () => {
                // Reset transform
                card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
            });
        });
    </script>
</body>

</html>
